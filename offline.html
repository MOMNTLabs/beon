<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#040714">
    <title>Bexon offline</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(122, 166, 255, 0.18), transparent 28%),
                radial-gradient(circle at bottom right, rgba(127, 212, 196, 0.16), transparent 24%),
                linear-gradient(180deg, #07101c 0%, #040714 100%);
            color: #eef3ff;
        }

        .offline-card {
            width: min(460px, 100%);
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            background: rgba(8, 12, 22, 0.9);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 32px;
            padding: 0 12px;
            border-radius: 999px;
            background: rgba(127, 212, 196, 0.14);
            color: #9fe6d7;
            font-size: 0.86rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2rem, 5vw, 2.6rem);
            line-height: 1.04;
        }

        p {
            margin: 0;
            color: rgba(231, 239, 255, 0.76);
            line-height: 1.6;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
        }

        .actions a,
        .actions button {
            appearance: none;
            border: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 999px;
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }

        .actions a {
            background: linear-gradient(135deg, #7aa6ff, #7fd4c4);
            color: #06101a;
            font-weight: 700;
        }

        .actions button {
            background: rgba(255, 255, 255, 0.06);
            color: #eef3ff;
        }
    </style>
</head>
<body>
    <main class="offline-card">
        <span class="badge">Modo offline</span>
        <h1>Bexon sem conexao.</h1>
        <p>O app precisa da internet para carregar os dados atuais do workspace. Quando a conexao voltar, recarregue para continuar de onde voce parou.</p>
        <div class="actions">
            <a href="./?pwa=1">Tentar novamente</a>
            <button type="button" onclick="window.location.reload()">Recarregar</button>
        </div>
    </main>
</body>
</html>
